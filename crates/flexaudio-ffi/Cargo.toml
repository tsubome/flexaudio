[package]
name = "flexaudio-ffi"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
authors.workspace = true
repository.workspace = true
description = "C FFI bindings for flexaudio (pull-based C ABI; header generated by cbindgen)."
# staticlib/cdylib は crates.io ではライブラリとして消費できない（C から直接リンク
# して使う）。napi と同じく公開しない。
publish = false

# C から叩く第三の経路（第一は CLI パイプ、第二は N-API addon）。呼び出し側が
# poll_chunk / poll_event を周期的に呼ぶプル型の C ABI を出す。staticlib（.a）と
# cdylib（.so/.dll/.dylib）の両方を生成する。
[lib]
name = "flexaudio_ffi"
crate-type = ["staticlib", "cdylib"]

[dependencies]
flexaudio = { path = "../flexaudio" }
