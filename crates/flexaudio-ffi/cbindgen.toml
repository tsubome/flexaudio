# cbindgen 設定。flexaudio-ffi の C ABI から include/flexaudio.h を生成する。
# 生成コマンド: cbindgen --config cbindgen.toml --crate flexaudio-ffi --output include/flexaudio.h

language = "C"
pragma_once = true
include_guard = "FLEXAUDIO_H"
# Rust の doc コメントを C のヘッダにも doc として出す。
documentation = true
documentation_style = "c99"
# 関数の前に空行を入れて読みやすくする。
line_length = 100
tab_width = 4
cpp_compat = false

header = """
/*
 * flexaudio C API — pull-based audio capture bindings.
 *
 * This header is generated from crates/flexaudio-ffi by cbindgen. Do not edit by hand;
 * regenerate it after changing the Rust ABI.
 */
"""

[export]
prefix = ""

[enum]
# C の enum を `enum { ... }` として出し、#[repr(C)] の判別値どおりにする。
prefix_with_name = false
rename_variants = "QualifiedScreamingSnakeCase"

[parse]
parse_deps = false
